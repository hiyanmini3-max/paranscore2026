<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파란수학 · 고1 성적 (선생님용 보기)</title>
<style>
  :root{
    --bg:#0f1117;--panel:#171a23;--panel2:#1d212c;--line:#262b38;
    --txt:#e8ebf2;--sub:#9aa3b5;--accent:#3b82f6;--accent2:#60a5fa;
    --t1:#f5b942;--t2:#60a5fa;--t3:#34d399;--t4:#a78bfa;--t5:#fb7185;--gray:#64748b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,'Segoe UI','Malgun Gothic',sans-serif;
    background:var(--bg);color:var(--txt);line-height:1.55;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto;padding:28px 20px 80px}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px}
  .brand{display:flex;align-items:center;gap:13px}
  .logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#3b82f6,#1e40af);
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:19px;color:#fff;box-shadow:0 4px 14px rgba(59,130,246,.4)}
  .brand h1{font-size:19px;font-weight:700;letter-spacing:-.3px}
  .brand p{font-size:12.5px;color:var(--sub);margin-top:1px}
  .tools{display:flex;gap:9px;flex-wrap:wrap}
  .btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);padding:9px 15px;border-radius:9px;font-size:13px;cursor:pointer;font-weight:500;transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent2)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent2)}
  .tierbar{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
  .tcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px;cursor:pointer;transition:.15s;border-top:3px solid var(--line)}
  .tcard:hover{transform:translateY(-2px)}
  .tcard.on{background:var(--panel2)}
  .tcard.c1{border-top-color:var(--t1)} .tcard.c2{border-top-color:var(--t2)}
  .tcard.c3{border-top-color:var(--t3)} .tcard.c4{border-top-color:var(--t4)}
  .tcard.c5{border-top-color:var(--t5)} .tcard.c0{border-top-color:var(--gray)}
  .tcard .nm{font-size:13px;font-weight:600;margin-bottom:6px}
  .tcard .ct{font-size:22px;font-weight:700}
  .tcard .av{font-size:11px;color:var(--sub);margin-top:2px}
  .note{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:10px;padding:13px 16px;font-size:12.6px;color:var(--sub);margin-bottom:20px}
  .note b{color:var(--accent2)}
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
  .filters input,.filters select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:8px 12px;border-radius:8px;font-size:13px;outline:none}
  .filters input:focus,.filters select:focus{border-color:var(--accent)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;transition:.18s;position:relative}
  .card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.35)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px}
  .rk{font-size:12px;color:var(--sub);font-weight:600}
  .nm{font-size:16px;font-weight:700;margin:2px 0}
  .meta{font-size:11.5px;color:var(--sub)}
  .tier{font-size:10.5px;font-weight:700;padding:4px 9px;border-radius:20px;white-space:nowrap}
  .tier.c1{background:rgba(245,185,66,.15);color:var(--t1)}
  .tier.c2{background:rgba(96,165,250,.15);color:var(--t2)}
  .tier.c3{background:rgba(52,211,153,.15);color:var(--t3)}
  .tier.c4{background:rgba(167,139,250,.15);color:var(--t4)}
  .tier.c5{background:rgba(251,113,133,.15);color:var(--t5)}
  .tier.c0{background:rgba(100,116,139,.18);color:var(--gray)}
  .scores{display:flex;gap:5px;margin:11px 0}
  .sc{flex:1;text-align:center;background:var(--panel2);border-radius:7px;padding:6px 2px}
  .sc .l{font-size:10px;color:var(--sub)} .sc .v{font-size:14px;font-weight:700;margin-top:1px}
  .sc.weak{outline:1.5px solid var(--t5)} .sc.weak .v{color:var(--t5)}
  .metrics{display:flex;gap:12px;font-size:11px;color:var(--sub);margin-bottom:10px;flex-wrap:wrap}
  .metrics b{color:var(--txt)}
  .flag{font-size:10px;color:var(--t5);font-weight:600}
  .books{border-top:1px solid var(--line);padding-top:10px}
  .books .h{font-size:10.5px;color:var(--sub);margin-bottom:6px;font-weight:600}
  .bk{display:flex;justify-content:space-between;gap:10px;font-size:11.5px;padding:3px 0}
  .bk .b1{font-weight:600;color:var(--accent2)} .bk .b2{color:var(--sub);font-size:10.5px;text-align:right;flex:1}
  .up{color:var(--t3)} .dn{color:var(--t5)}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .modal.on{display:flex}
  .mbox{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:470px;width:100%;padding:24px}
  .mbox h3{font-size:18px;margin-bottom:4px}
  .mbox .sub{color:var(--sub);font-size:13px;margin-bottom:18px}
  .frow{display:flex;gap:8px;margin-bottom:10px;align-items:center}
  .frow label{width:60px;font-size:13px;color:var(--sub)}
  .frow input{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:9px 12px;border-radius:8px;font-size:13px;outline:none}
  .mbtns{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
  footer{text-align:center;color:var(--sub);font-size:11.5px;margin-top:36px}
  @media(max-width:760px){.tierbar{grid-template-columns:repeat(3,1fr)}}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}
</style>
</head>

let activeTier = '';
const TIERS=['최상위권','상위권','중상위권','중하위권','하위권','미응시'];
const TCLS={'최상위권':'c1','상위권':'c2','중상위권':'c3','중하위권':'c4','하위권':'c5','미응시':'c0'};

function recompute(){
  const S=DB.students;
  const means=[0,0,0,0],cnt=[0,0,0,0];
  S.forEach(s=>s.sc.forEach((v,i)=>{if(typeof v==='number'){means[i]+=v;cnt[i]++;}}));
  for(let i=0;i<4;i++)means[i]=cnt[i]?means[i]/cnt[i]:0;
  const sds=[0,0,0,0];
  S.forEach(s=>s.sc.forEach((v,i)=>{if(typeof v==='number')sds[i]+=(v-means[i])**2;}));
  for(let i=0;i<4;i++)sds[i]=cnt[i]?Math.sqrt(sds[i]/cnt[i]):1;
  DB.means=means;DB.sds=sds;
  S.forEach(s=>{
    const att=s.sc.filter(v=>typeof v==='number');
    s.n=att.length;
    const zs=s.sc.map((v,i)=>typeof v==='number'?(v-means[i])/(sds[i]||1):null).filter(x=>x!==null);
    s.z=zs.length?+(zs.reduce((a,b)=>a+b,0)/zs.length).toFixed(3):null;
    s.raw=att.length?+(att.reduce((a,b)=>a+b,0)/att.length).toFixed(2):null;
    const m=att.length?att.reduce((a,b)=>a+b,0)/att.length:0;
    s.vol=att.length>=2?+Math.sqrt(att.reduce((a,b)=>a+(b-m)**2,0)/att.length).toFixed(2):0;
    s.trend=att.length>=2?+(att[att.length-1]-att[0]).toFixed(1):0;
    const labs=['1차','2차','3차','4차'];let wi=-1,wv=99;
    s.sc.forEach((v,i)=>{if(typeof v==='number'&&v<wv){wv=v;wi=i;}});
    s.weak=wi>=0?labs[wi]:'-';
    s.lowconf=s.n<3;
    s.books=matchBooks(s);
  });
  const ranked=S.filter(s=>s.z!==null).sort((a,b)=>b.z-a.z);
  const N=ranked.length, rest=N-35, cs=Math.floor(rest/3);
  ranked.forEach((s,i)=>{s.rank=i+1;
    if(i<15)s.tier='최상위권';else if(i<35)s.tier='상위권';
    else if(i<35+cs)s.tier='중상위권';else if(i<35+2*cs)s.tier='중하위권';else s.tier='하위권';});
  S.filter(s=>s.z===null).forEach(s=>{s.rank=null;s.tier='미응시';s.lowconf=true;});
}
function matchBooks(s){
  if(s.z===null)return[['미응시 - 진단 보류','다음 회차 응시 후 재분류']];
  const z=s.z,vol=s.vol,tr=s.trend;let r;
  if(z>=1.6)r=[['블랙라벨 (공통수학)','최상위 변별 문항'],['하이레벨 / 고난도 N제','킬러문항 훈련']];
  else if(z>=1.1)r=[['일등급 수학','1등급 안정화 고난도'],['블랙라벨','상위 변별 도전']];
  else if(z>=0.5)r=[['일품 수학','상위권 진입 응용'],['쎈 C + 일등급','기본→고난도 연결']];
  else if(z>=0)r=[['쎈 (B/C단계)','유형 숙달·응용'],['일품 수학','약점 단원 집중']];
  else if(z>=-0.6)r=[['쎈 (A/B단계)','기본 유형 반복'],['개념원리 RPM','준킬러 대비']];
  else r=[['개념원리 / 수학의 바이블','개념 처음부터 재정비'],['라이트 쎈','기초 유형 완성']];
  if(vol>=2.8)r.push(['실전 모의고사 + 오답노트','편차 큼 → 실수 관리']);
  if(tr<=-3)r.push(['직전 단원 개념서 재점검','하락 추세 → 개념 보강']);
  return r;
}
function renderTierbar(){
  const tb=document.getElementById('tierbar');tb.innerHTML='';
  TIERS.forEach(t=>{
    const g=DB.students.filter(s=>s.tier===t);
    if(t==='미응시'&&g.length===0)return;
    const avg=g.length&&g[0].raw!==null?(g.reduce((a,s)=>a+(s.raw||0),0)/g.length).toFixed(1):'-';
    const el=document.createElement('div');
    el.className='tcard '+TCLS[t]+(activeTier===t?' on':'');
    el.onclick=()=>{activeTier=activeTier===t?'':t;render();};
    el.innerHTML=`<div class="nm">${t}</div><div class="ct">${g.length}<span style="font-size:12px;color:var(--sub)">명</span></div><div class="av">평균 ${avg}/25</div>`;
    tb.appendChild(el);
  });
}
function render(){
  const q=document.getElementById('q').value.trim();
  const fsch=document.getElementById('fsch').value, ftch=document.getElementById('ftch').value;
  const sort=document.getElementById('sort').value;
  let list=DB.students.slice();
  if(activeTier)list=list.filter(s=>s.tier===activeTier);
  if(q)list=list.filter(s=>s.name.includes(q)||(s.sch||'').includes(q));
  if(fsch)list=list.filter(s=>s.sch===fsch);
  if(ftch)list=list.filter(s=>s.tch===ftch);
  if(sort==='rank')list.sort((a,b)=>(a.rank||999)-(b.rank||999));
  if(sort==='vol')list.sort((a,b)=>b.vol-a.vol);
  if(sort==='trend')list.sort((a,b)=>a.trend-b.trend);
  const g=document.getElementById('grid');g.innerHTML='';
  list.forEach(s=>{
    const sc=s.sc.map((v,i)=>{const lab=['1차','2차','3차','4차'][i];
      const w=(lab===s.weak)?' weak':'';
      return `<div class="sc${w}"><div class="l">${lab}</div><div class="v">${typeof v==='number'?v:'·'}</div></div>`;}).join('');
    const trc=s.trend>0?'up':(s.trend<0?'dn':'');const trs=s.trend>0?'+'+s.trend:s.trend;
    const books=s.books.map(b=>`<div class="bk"><span class="b1">${b[0]}</span><span class="b2">${b[1]}</span></div>`).join('');
    const flag=s.lowconf?`<span class="flag">⚠ ${s.n}회 응시 · 신뢰도 낮음</span>`:'';
    const el=document.createElement('div');el.className='card';
    el.innerHTML=`<div class="top"><div><div class="rk">${s.rank?'#'+s.rank:'-'}</div>
      <div class="nm">${s.name}</div><div class="meta">${s.sch||''} · ${s.tch||''}</div></div>
      <span class="tier ${TCLS[s.tier]}">${s.tier}</span></div>
      <div class="scores">${sc}</div>
      <div class="metrics">${s.raw!==null?`<span>평균 <b>${s.raw}</b>/25</span><span>표준점수 <b>${s.z}</b></span>
        <span>변동 <b>${s.vol}</b></span><span>추세 <b class="${trc}">${trs}</b></span>`:''}${flag}</div>
      <div class="books"><div class="h">추천 교재${s.weak!=='-'?' · 약점회차 '+s.weak:''}</div>${books}</div>`;
    g.appendChild(el);
  });
  renderTierbar();
}

function openAdd(){editName=null;document.getElementById('mTitle').textContent='새 학생 / 성적 입력';
  ['iName','iSch','iTch','i0','i1','i2','i3'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('iName').disabled=false;document.getElementById('modal').classList.add('on');}
function openEdit(name){editName=name;const s=DB.students.find(x=>x.name===name);
  document.getElementById('mTitle').textContent=name+' · 성적 수정';
  document.getElementById('iName').value=s.name;document.getElementById('iName').disabled=true;
  document.getElementById('iSch').value=s.sch||'';document.getElementById('iTch').value=s.tch||'';
  [0,1,2,3].forEach(i=>document.getElementById('i'+i).value=typeof s.sc[i]==='number'?s.sc[i]:'');
  document.getElementById('modal').classList.add('on');}
function closeModal(){document.getElementById('modal').classList.remove('on');}
function saveStudent(){
  const name=document.getElementById('iName').value.trim();if(!name){alert('이름을 입력하세요');return;}
  const sc=[0,1,2,3].map(i=>{const v=document.getElementById('i'+i).value;return v===''?null:+v;});
  let s=DB.students.find(x=>x.name===name);
  if(s){s.sc=sc;s.sch=document.getElementById('iSch').value;s.tch=document.getElementById('iTch').value;}
  else DB.students.push({name,sch:document.getElementById('iSch').value,tch:document.getElementById('iTch').value,sc});
  recompute();fillSelects();render();closeModal();
}
function exportCSV(){
  const rows=[['순위','등급','이름','학교','강사','1차','2차','3차','4차','평균','표준점수','변동성','추세','약점회차','신뢰도','추천교재1','추천교재2']];
  DB.students.slice().sort((a,b)=>(a.rank||999)-(b.rank||999)).forEach(s=>{
    rows.push([s.rank||'',s.tier,s.name,s.sch||'',s.tch||'',...s.sc.map(v=>typeof v==='number'?v:''),
      s.raw||'',s.z||'',s.vol,s.trend,s.weak,s.lowconf?'낮음('+s.n+'회)':'정상',
      (s.books[0]||['',''])[0],(s.books[1]||['',''])[0]]);});
  const csv='\ufeff'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='파란수학_고1_5등급분류.csv';a.click();
}
recompute();fillSelects();render();
</script>
