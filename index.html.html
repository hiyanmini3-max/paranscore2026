<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>파란수학 고등관 — 2026 성적 현황</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--gold-l:#E8C97A;--gold-p:#F7EDD0;--gold-d:#8B6F2E;--white:#fff;--off:#FAFAF7;--sur:#F5F3EE;--bdr:#E8E0CC;--bdr-g:#D4B96A;--tx:#1A1612;--tx2:#6B5D45;--tx3:#A8977C;--g1b:#F0F7ED;--g1t:#2D6A1F;--g1s:#7BBD68;--g2b:#EDF3FA;--g2t:#1A4F8A;--g2s:#6BA3D6;--g3b:#FEF7E8;--g3t:#7A4F0A;--g3s:#D4A040;--g4b:#FDEEED;--g4t:#8B2020;--g4s:#D46060;--g5b:#F5E8F5;--g5t:#6B1A7A;--g5s:#B06AB0}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',sans-serif;background:var(--off);color:var(--tx);min-height:100vh}
/* HEADER */
.hdr{background:var(--white);border-bottom:1px solid var(--bdr);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:60px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-bar{width:3px;height:22px;background:linear-gradient(to bottom,var(--gold-l),var(--gold));border-radius:2px}
.logo-main{font-family:'Noto Serif KR',serif;font-size:19px;font-weight:600;color:var(--tx);letter-spacing:-.02em}
.logo-sub{font-size:11px;color:var(--gold);font-weight:500;letter-spacing:.06em;border-left:1px solid var(--bdr-g);padding-left:10px}
.hdr-right{display:flex;align-items:center;gap:10px}
.updated{font-size:11px;color:var(--tx3);background:var(--sur);padding:4px 10px;border-radius:20px;border:1px solid var(--bdr)}
/* TABS */
.tabs{background:var(--white);border-bottom:1px solid var(--bdr);padding:0 28px;display:flex}
.tab{padding:14px 24px;font-size:13px;font-weight:500;color:var(--tx3);cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;user-select:none}
.tab:hover{color:var(--tx2)}
.tab.on{color:var(--gold-d);border-bottom-color:var(--gold);font-weight:600}
.tab-cnt{display:inline-block;font-size:10px;background:var(--gold-p);color:var(--gold-d);border-radius:10px;padding:1px 6px;margin-left:5px}
/* CONTENT */
.content{padding:20px 28px;max-width:1380px;margin:0 auto}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--white);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold-l),var(--gold))}
.sc-lbl{font-size:10px;color:var(--tx3);margin-bottom:6px;letter-spacing:.04em;font-weight:500;text-transform:uppercase}
.sc-val{font-size:26px;font-weight:600;color:var(--tx);font-family:'Noto Serif KR',serif;letter-spacing:-.03em}
.sc-val span{font-size:13px;font-weight:400;color:var(--tx3);margin-left:2px;font-family:'Noto Sans KR',sans-serif}
.sc-sub{font-size:11px;color:var(--tx3);margin-top:3px}
.sc.gold .sc-val{color:var(--gold-d)}
/* GRID */
.grid{display:grid;grid-template-columns:1fr 320px;gap:16px}
/* CARD */
.card{background:var(--white);border:1px solid var(--bdr);border-radius:14px;overflow:hidden}
.card-hdr{padding:13px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;background:var(--white)}
.card-ttl{font-size:12px;font-weight:600;color:var(--tx);letter-spacing:-.01em}
.ctrls{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.srch{font-size:12px;border:1px solid var(--bdr);border-radius:6px;padding:5px 9px;width:130px;background:var(--sur);color:var(--tx);font-family:'Noto Sans KR',sans-serif;outline:none}
.srch:focus{border-color:var(--bdr-g)}
.sel{font-size:11px;color:var(--tx2);border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;background:var(--sur);cursor:pointer;font-family:'Noto Sans KR',sans-serif;outline:none}
/* TABLE */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:var(--sur)}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--tx3);letter-spacing:.04em;white-space:nowrap;border-bottom:1px solid var(--bdr)}
th:first-child{padding-left:18px}
td{padding:10px 12px;border-bottom:1px solid var(--bdr);vertical-align:middle}
td:first-child{padding-left:18px}
tbody tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover{background:#FDFCF8}
tbody tr.sel{background:var(--gold-p)}
.nm{font-weight:500;font-size:13px}
.stag{display:inline-block;font-size:10px;color:var(--tx3);background:var(--sur);border-radius:4px;padding:1px 5px}
.ttag{font-size:11px;color:var(--tx2)}
.gb{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:50%;font-size:11px;font-weight:700}
.gb1{background:var(--g1b);color:var(--g1t);border:1px solid var(--g1s)}
.gb2{background:var(--g2b);color:var(--g2t);border:1px solid var(--g2s)}
.gb3{background:var(--g3b);color:var(--g3t);border:1px solid var(--g3s)}
.gb4{background:var(--g4b);color:var(--g4t);border:1px solid var(--g4s)}
.gb5{background:var(--g5b);color:var(--g5t);border:1px solid var(--g5s)}
.gbn{background:var(--sur);color:var(--tx3);border:1px solid var(--bdr);font-size:9px}
.sv{font-weight:600;font-size:13px}
.sn{color:var(--tx3);font-size:11px}
/* SIDE */
.side{display:flex;flex-direction:column;gap:14px}
.db{margin-bottom:7px}
.dl{display:flex;justify-content:space-between;margin-bottom:3px}
.dl span{font-size:11px;color:var(--tx2)}
.dl strong{font-size:11px;color:var(--tx)}
.dt{height:7px;background:var(--sur);border-radius:4px;overflow:hidden}
.df{height:100%;border-radius:4px;transition:width .5s}
.df1{background:var(--g1s)}.df2{background:var(--g2s)}.df3{background:var(--g3s)}.df4{background:var(--g4s)}.df5{background:var(--g5s)}
.sl-row{display:flex;align-items:center;padding:8px 16px;border-bottom:1px solid var(--bdr);gap:8px}
.sl-row:last-child{border-bottom:none}
.sl-nm{flex:1;font-size:12px;font-weight:500}
.sl-bar{width:72px;height:5px;background:var(--sur);border-radius:3px;overflow:hidden}
.sl-bf{height:100%;background:linear-gradient(90deg,var(--gold-l),var(--gold));border-radius:3px}
.sl-cnt{font-size:11px;color:var(--tx3);min-width:30px;text-align:right}
/* DETAIL */
.dp{position:fixed;right:0;top:60px;bottom:0;width:360px;background:var(--white);border-left:1px solid var(--bdr);z-index:50;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto;display:flex;flex-direction:column}
.dp.open{transform:translateX(0)}
.dh{padding:20px;border-bottom:1px solid var(--bdr);background:linear-gradient(135deg,var(--gold-p),var(--white));position:relative}
.dh::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--gold-l),var(--gold))}
.dc{position:absolute;top:14px;right:14px;width:26px;height:26px;border-radius:50%;background:var(--sur);border:1px solid var(--bdr);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--tx2)}
.dc:hover{background:var(--bdr)}
.dav{width:48px;height:48px;border-radius:50%;background:var(--gold-p);border:2px solid var(--bdr-g);display:flex;align-items:center;justify-content:center;font-family:'Noto Serif KR',serif;font-size:17px;font-weight:600;color:var(--gold-d);margin-bottom:10px}
.dnm{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:600;letter-spacing:-.02em;margin-bottom:3px}
.dmt{font-size:11px;color:var(--tx2);line-height:1.6}
.db2{padding:18px 20px;flex:1}
.ds{margin-bottom:18px}
.dstl{font-size:9px;font-weight:600;color:var(--tx3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sb{background:var(--sur);border-radius:9px;padding:11px 13px;border:1px solid var(--bdr)}
.sb.hl{background:var(--gold-p);border-color:var(--bdr-g)}
.sbl{font-size:9px;color:var(--tx3);margin-bottom:5px;font-weight:500}
.sbv{font-size:18px;font-weight:700;font-family:'Noto Serif KR',serif}
.sb.hl .sbv{color:var(--gold-d)}
.sbs{font-size:10px;color:var(--tx3);margin-top:2px}
.br{background:var(--sur);border-radius:9px;padding:12px;border-left:3px solid var(--gold);margin-bottom:7px}
.brl{font-size:9px;color:var(--gold-d);font-weight:600;margin-bottom:3px;letter-spacing:.04em}
.brt{font-size:12px;font-weight:600;margin-bottom:2px}
.brd{font-size:10px;color:var(--tx2);line-height:1.5}
.nb{background:#FFFDF5;border:1px solid var(--gold-p);border-radius:7px;padding:10px 12px;font-size:11px;color:var(--tx2);line-height:1.6}
.empty td{text-align:center;padding:40px;color:var(--tx3);font-size:12px}
@media(max-width:900px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.content{padding:14px}}
</style>
</head>

function gg(s){
  if(s.grade<3) return s.mid1_grade;
  return s.mock3_grade ? parseInt(s.mock3_grade) : null;
}
function gs(s){
  if(s.grade<3) return s.mid1_score;
  return s.mock3_score ? parseFloat(s.mock3_score) : null;
}

function sw(g){
  cg=g; sid=null; cd();
  [1,2,3].forEach(i=>{
    document.getElementById('t'+i).className='tab'+(i===g?' on':'');
  });
  uf(); uft(); rt(); rd(); rsch();
}

function uf(){
  const s=D['g'+cg], scored=s.filter(x=>gg(x)!=null);
  const g1s=scored.filter(x=>gg(x)===1);
  const sc=scored.map(x=>gs(x)).filter(x=>x!=null);
  document.getElementById('s0').innerHTML=s.length+'<span>명</span>';
  document.getElementById('s0b').textContent='성적 보유 '+scored.length+'명';
  document.getElementById('s1').innerHTML=g1s.length+'<span>명</span>';
  document.getElementById('s1b').textContent=scored.length?'비율 '+(g1s.length/scored.length*100).toFixed(1)+'%':'—';
  if(sc.length){
    const avg=sc.reduce((a,b)=>a+b,0)/sc.length;
    document.getElementById('s2').innerHTML=avg.toFixed(1)+'<span>점</span>';
    document.getElementById('s2b').textContent='최고 '+Math.max(...sc)+' / 최저 '+Math.min(...sc);
  } else {
    document.getElementById('s2').innerHTML='—<span>점</span>';
    document.getElementById('s2b').textContent='—';
  }
  const ts=[...new Set(D['g'+cg].map(x=>x.teacher).filter(Boolean))];
  document.getElementById('s3').innerHTML=ts.length+'<span>명</span>';
  document.getElementById('s3b').textContent=ts.slice(0,3).join(' · ')+(ts.length>3?' 외 '+(ts.length-3)+'명':'');
}

function uft(){
  const ts=[...new Set(D['g'+cg].map(x=>x.teacher).filter(Boolean))].sort();
  const el=document.getElementById('ft');
  el.innerHTML='<option value="">전체 선생님</option>';
  ts.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;el.appendChild(o);});
}

function gf(){
  const s=D['g'+cg];
  const q=document.getElementById('sq').value.trim().toLowerCase();
  const ft=document.getElementById('ft').value;
  const fg=document.getElementById('fg').value;
  return s.filter(x=>{
    if(q&&!x.name.includes(q)&&!x.school.toLowerCase().includes(q)) return false;
    if(ft&&x.teacher!==ft) return false;
    if(fg){
      const g=gg(x);
      if(fg==='0'){if(g!=null) return false;}
      else if(fg==='4'){if(!g||g<4) return false;}
      else{if(String(g)!==fg) return false;}
    }
    return true;
  });
}

function gbh(g){
  if(!g) return '<div class="gb gbn">-</div>';
  const c=Math.min(g,5);
  return '<div class="gb gb'+c+'">'+g+'</div>';
}

  const lbs=['1등급','2등급','3등급','4등급','5등급+'];
  document.getElementById('dist').innerHTML=lbs.map((l,i)=>
    '<div class="db"><div class="dl"><span>'+l+'</span><strong>'+cnt[i]+'명</strong></div><div class="dt"><div class="df df'+(i+1)+'" style="width:'+Math.round(cnt[i]/mx*100)+'%"></div></div></div>'
  ).join('');
}

function rsch(){
  const s=D['g'+cg], mp={};
  s.forEach(x=>{mp[x.school]=(mp[x.school]||0)+1;});
  const sorted=Object.entries(mp).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const mx=sorted[0]?.[1]||1;
  document.getElementById('schools').innerHTML=sorted.map(([sc,n])=>
    '<div class="sl-row"><span class="sl-nm">'+sc+'</span><div class="sl-bar"><div class="sl-bf" style="width:'+Math.round(n/mx*100)+'%"></div></div><span class="sl-cnt">'+n+'명</span></div>'
  ).join('');
}

function ss(id){
  sid=id;
  document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('sel'));
  const row=document.querySelector('tbody tr[onclick*="'+id+'"]');
  if(row) row.classList.add('sel');
  const s=[...D.g1,...D.g2,...D.g3].find(x=>x.id===id);
  if(!s) return;

  document.getElementById('dav').textContent=s.name[0];
  document.getElementById('dnm').textContent=s.name;
  let mt=s.school+' · 고'+s.grade+'학년<br>담당: '+s.teacher;
  if(s.grade===3&&s.exam_type&&s.exam_type!=='nan') mt+=' · '+s.exam_type;
  document.getElementById('dmt').innerHTML=mt;

  let html='<div class="ds"><div class="dstl">성적 현황</div><div class="sg">';
  if(s.grade<3){
    const g=s.mid1_grade,sc=s.mid1_score,rk=s.mid1_rank;
    html+='<div class="sb hl"><div class="sbl">1학기 중간 — 등급</div><div class="sbv">'+(g?g+'등급':'—')+'</div></div>';
    html+='<div class="sb"><div class="sbl">원점수 / 석차</div><div class="sbv">'+(sc!=null?sc+'점':'—')+'</div><div class="sbs">석차 '+(rk&&rk!=='null'?rk:'—')+'</div></div>';
  } else {
    const mg=s.mock3_grade,ms=s.mock3_score,ig=s.mid1_grade;
    html+='<div class="sb hl"><div class="sbl">3월 모의 — 등급</div><div class="sbv">'+(mg&&mg!=='None'?mg+'등급':'—')+'</div><div class="sbs">원점수 '+(ms&&ms!=='None'?ms+'점':'—')+'</div></div>';
    html+='<div class="sb"><div class="sbl">1학기 중간</div><div class="sbv">'+(ig&&ig!=='-'&&ig!=='None'&&ig!=='X'?ig+(isNaN(ig)?'':'점'):'—')+'</div></div>';
    if(s.subject&&s.subject!=='nan'&&s.subject!=='안봄'&&s.subject!=='X'){
      html+='<div class="sb" style="grid-column:1/-1"><div class="sbl">수능 선택과목</div><div class="sbv" style="font-size:15px">'+s.subject+'</div></div>';
    }
  }
  html+='</div></div>';

  // 교재 추천
  const gr=gg(s);
  if(gr){
    const bk=BOOKS[Math.min(gr,4)];
    html+='<div class="ds"><div class="dstl">추천 교재</div>';
    bk.forEach(b=>{ html+='<div class="br"><div class="brl">'+b.l+'</div><div class="brt">'+b.t+'</div><div class="brd">'+b.d+'</div></div>'; });
    html+='</div>';
  }

  // 비고
  const nt=s.note&&s.note!=='nan'&&s.note!=='None'&&s.note!=='X'&&s.note.trim();
  if(nt) html+='<div class="ds"><div class="dstl">선생님 메모</div><div class="nb">'+nt+'</div></div>';

  // 수강반
  if(s.class_name&&s.class_name!=='nan'){
    html+='<div class="ds"><div class="dstl">수강반</div><div class="nb" style="font-size:10px">'+s.class_name+'</div></div>';
  }

  document.getElementById('db2').innerHTML=html;
  document.getElementById('dp').classList.add('open');
}

function cd(){
  document.getElementById('dp').classList.remove('open');
  sid=null;
  document.querySelectorAll('tbody tr').forEach(r=>r.classList.remove('sel'));
}

// init
document.getElementById('c1').textContent=D.g1.length;
document.getElementById('c2').textContent=D.g2.length;
document.getElementById('c3').textContent=D.g3.length;
sw(1);
</script>
</body>
</html>
